name: Release

# 推 vX.Y.Z 标签触发：编译 Release → Developer ID 签名（带可信时间戳）→
# 提交 Apple 公证并等待通过 → staple 公证票据 → 打包 → 发布到 GitHub Releases。
# 版本号以标签为唯一事实来源，运行时覆盖 project.yml 里的占位值，不需要每次发版改文件。
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  APPLE_TEAM_ID: JD2ZQL6YU2

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.2"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Derive version from tag
        id: version
        run: |
          tag="${GITHUB_REF_NAME}"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Generate project
        run: xcodegen generate

      # 导入 Developer ID 证书到一个临时 keychain，仅本次 job 存活期间有效。
      - name: Import signing certificate
        env:
          P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          P12_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PASSWORD=$(openssl rand -base64 24)
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"

          CERT_PATH="$RUNNER_TEMP/cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

          echo -n "$P12_BASE64" | base64 --decode -o "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed 's/"//g')
          rm -f "$CERT_PATH"

      - name: Build (Release, Developer ID signed)
        run: |
          xcodebuild -project Baobox.xcodeproj -scheme Baobox -configuration Release \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            OTHER_CODE_SIGN_FLAGS="--timestamp --keychain $KEYCHAIN_PATH" \
            MARKETING_VERSION="${{ steps.version.outputs.version }}" \
            CURRENT_PROJECT_VERSION="${{ github.run_number }}" \
            CONFIGURATION_BUILD_DIR="$RUNNER_TEMP/build" \
            build

      - name: Notarize
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          echo -n "$APPLE_API_KEY_P8_BASE64" | base64 --decode -o "$KEY_PATH"

          ditto -c -k --keepParent "$RUNNER_TEMP/build/Baobox.app" "$RUNNER_TEMP/Baobox-notarize.zip"
          xcrun notarytool submit "$RUNNER_TEMP/Baobox-notarize.zip" \
            --key "$KEY_PATH" --key-id "$APPLE_API_KEY_ID" --issuer "$APPLE_API_ISSUER" \
            --wait

          xcrun stapler staple "$RUNNER_TEMP/build/Baobox.app"
          rm -f "$KEY_PATH" "$RUNNER_TEMP/Baobox-notarize.zip"

      - name: Package
        id: package
        run: |
          ZIP_NAME="Baobox-${{ steps.version.outputs.version }}.zip"
          ditto -c -k --keepParent "$RUNNER_TEMP/build/Baobox.app" "$ZIP_NAME"
          echo "zip=$ZIP_NAME" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            "${{ steps.package.outputs.zip }}" \
            --title "Baobox ${{ steps.version.outputs.tag }}" \
            --generate-notes

      - name: Clean up keychain
        if: always()
        run: security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
