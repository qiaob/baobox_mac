name: CI

on:
  # 只手动触发（GitHub Actions 页 “Run workflow”）——不再随 push main / PR 自动跑。
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.2"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      # 编译验证不签名：CI runner 上没有个人开发证书，也不需要——
      # 这一步只确认代码能编过，产物不落地、不分发。
      - name: Build
        run: |
          xcodebuild -project Baobox.xcodeproj -scheme Baobox -configuration Debug \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO \
            build
