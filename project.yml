name: Baobox
options:
  bundleIdPrefix: com.baobox
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

targets:
  Baobox:
    type: application
    platform: macOS
    sources:
      - Sources
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: Baobox
        CFBundleShortVersionString: "0.0.2"
        CFBundleVersion: "1"
        LSUIElement: true
        LSApplicationCategoryType: public.app-category.productivity
        CFBundleIconFile: AppIcon
        NSHumanReadableCopyright: "© 2026 Baobox"
        NSMicrophoneUsageDescription: "录屏时用于录制你的声音（可选开启）。Used to record your voice during screen recording (optional)."
        NSAppleEventsUsageDescription: "用于把已在运行的 Claude Code 会话所在的终端窗口切换到前台。Used to bring the terminal window hosting a running Claude Code session to the front."
        NSLocalNetworkUsageDescription: "网络抓包代理需要绑定局域网接口，供同网手机连接调试。The packet-capture proxy binds local-network interfaces so phones on the same network can connect for debugging."
    # Hardened Runtime 下访问麦克风必须显式声明 audio-input entitlement，
    # 只有 Info.plist 的用途描述是不够的。
    # 同理,向 iTerm2 / Terminal 发送 AppleScript(按 tty 选中会话标签页)
    # 需要 automation.apple-events entitlement。
    entitlements:
      path: Baobox.entitlements
      properties:
        com.apple.security.device.audio-input: true
        com.apple.security.automation.apple-events: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.baobox.app
        MARKETING_VERSION: "0.0.2"
        SWIFT_VERSION: "5.9"
        CODE_SIGN_STYLE: Automatic
        # 固定签名身份：ad-hoc 签名的 cdhash 每次重新编译都会变，macOS TCC 会因此
        # 判定为"另一个 App"并作废已授予的屏幕录制/辅助功能权限。绑定开发团队后
        # 签名身份稳定，重新编译不再掉权限。
        DEVELOPMENT_TEAM: JD2ZQL6YU2
        ENABLE_HARDENED_RUNTIME: true
        DEAD_CODE_STRIPPING: true
